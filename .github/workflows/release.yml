name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm-pkg: cli-darwin-arm64
            bin: oxvelte
          - target: x86_64-apple-darwin
            os: macos-latest
            npm-pkg: cli-darwin-x64
            bin: oxvelte
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm-pkg: cli-linux-x64-gnu
            bin: oxvelte
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm-pkg: cli-linux-arm64-gnu
            bin: oxvelte
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm-pkg: cli-win32-x64-msvc
            bin: oxvelte.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux arm64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Stage npm package
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} npm/@oxvelte/${{ matrix.npm-pkg }}/${{ matrix.bin }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm-pkg }}
          path: npm/@oxvelte/${{ matrix.npm-pkg }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage binaries
        run: |
          for dir in artifacts/cli-*; do
            pkg=$(basename "$dir")
            cp -r "$dir"/* "npm/@oxvelte/$pkg/"
            chmod +x "npm/@oxvelte/$pkg/oxvelte" 2>/dev/null || true
          done

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # Update all package.json versions
          for pkg_json in npm/@oxvelte/*/package.json; do
            sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" "$pkg_json"
          done

          # Update optionalDependencies versions
          sed -i "s/\"@oxvelte\/cli-\([^\"]*\)\": \"[^\"]*\"/\"@oxvelte\/cli-\1\": \"${VERSION}\"/g" npm/@oxvelte/lint/package.json

      - name: Copy README
        run: cp README.md npm/@oxvelte/lint/README.md

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/@oxvelte/cli-*; do
            if ls "$dir"/oxvelte* 1>/dev/null 2>&1; then
              echo "Publishing $(basename $dir)..."
              (cd "$dir" && npm publish --access public)
            fi
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm/@oxvelte/lint && npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cli-darwin-arm64/oxvelte
            artifacts/cli-darwin-x64/oxvelte
            artifacts/cli-linux-x64-gnu/oxvelte
            artifacts/cli-linux-arm64-gnu/oxvelte
            artifacts/cli-win32-x64-msvc/oxvelte.exe
